name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  integracao-continua:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar testes
        run: pytest

  entrega-continuo:
    needs: integracao-continua
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: docker build -t thiagocts/pedro-rocha-horchulhack:27-06-26 .

      - name: Push image
        run: docker push thiagocts/pedro-rocha-horchulhack:27-06-26