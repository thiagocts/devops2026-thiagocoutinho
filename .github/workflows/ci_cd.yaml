name: "Exemplo pipeline"

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  integracao-continua:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Instalação de dependências
        run: pip install -r requirements.txt
      - name: Testes unitários
        run: echo "Echo qualquer coisa"

  estagio2:
    needs: integracao-continua
    runs-on: ubuntu-latest
    steps:
      - name: "Sleep"
        run: echo "Sleep 5"

  estagio3:
    needs: estagio2
    runs-on: ubuntu-latest
    steps:
      - name: "Sleep"
        run: echo "Sleep 2"